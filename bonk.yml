      - name: Run Bonk
        uses: StringerBell69/ask-bonk/github@main
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: opencode/claude-opus-4-6
          fallback_model: openai/gpt-4o-mini-2024-07-18
          oidc_base_url: https://ask-bonk.dspro699.workers.dev/auth
          mentions: "/bonk,@ask-bonk"
          permissions: write
